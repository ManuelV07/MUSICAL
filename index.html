<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio 3D Interactiva</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      overflow:hidden;
      background:#0a0a0a;
      font-family:'Courier New', monospace;
    }

    /* UI Overlay */
    #ui-overlay{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:10;
    }

    /* Texto superior */
    #now-playing{
      position:fixed;
      top:40px;
      left:50%;
      transform:translateX(-50%);

      background:rgba(0,0,0,.8);
      border:1px solid #c8a96e55;

      color:#c8a96e;

      padding:12px 30px;

      font-size:12px;
      letter-spacing:5px;

      opacity:0;
      transition:.5s;
    }

    #now-playing.visible{
      opacity:1;
    }

    /* Texto inferior */
    #hint{
      position:fixed;
      bottom:40px;
      left:50%;
      transform:translateX(-50%);

      color:#c8a96e;

      font-size:13px;
      letter-spacing:4px;

      opacity:.8;

      animation:pulse 2s infinite;
    }

    @keyframes pulse{
      0%,100%{opacity:.3;}
      50%{opacity:1;}
    }

    /* Vinyl */
    #vinyl{
      position:fixed;
      bottom:90px;
      left:50%;
      transform:translateX(-50%);

      width:50px;
      height:50px;

      border-radius:50%;

      border:2px solid #c8a96e44;
      border-top-color:#c8a96e;

      opacity:0;
    }

    #vinyl.spinning{
      opacity:1;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{
        transform:translateX(-50%) rotate(360deg);
      }
    }

    /* Crosshair */
    #crosshair{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);

      width:20px;
      height:20px;
    }

    #crosshair::before,
    #crosshair::after{
      content:'';
      position:absolute;
      background:#c8a96e;
    }

    #crosshair::before{
      width:1px;
      height:100%;
      left:50%;
    }

    #crosshair::after{
      height:1px;
      width:100%;
      top:50%;
    }

  </style>

</head>

<body>

<!-- UI -->
<div id="ui-overlay">

  <div id="now-playing">
    ♪ JAILHOUSE ROCK — ELVIS PRESLEY ♪
  </div>

  <div id="hint">
    CLICK EN LA RADIO
  </div>

  <div id="vinyl"></div>

  <div id="crosshair"></div>

</div>

<!-- ESCENA -->
<a-scene
  background="color: #0a0a0a"
  renderer="antialias: true"
  vr-mode-ui="enabled: false">

  <!-- Assets -->
  <a-assets>

    <!-- Modelo -->
    <a-asset-item
      id="radio-model"
      src="old_radio.glb">
    </a-asset-item>

    <!-- Música -->
    <audio
      id="song"
      src="Elvis_Presley_-_Jailhouse_Rock__Music_Video_.mp3"
      preload="auto">
    </audio>

  </a-assets>

  <!-- Cámara -->
  <a-entity position="0 1.6 7">

    <a-camera look-controls wasd-controls>

      <a-cursor
        raycaster="objects: .clickable"
        color="#c8a96e">
      </a-cursor>

    </a-camera>

  </a-entity>

  <!-- Luces -->
  <a-light
    type="ambient"
    intensity="1.2"
    color="#ffffff">
  </a-light>

  <a-light
    type="point"
    intensity="2"
    color="#ffddaa"
    position="2 4 4">
  </a-light>

  <a-light
    type="point"
    intensity="1"
    color="#88aaff"
    position="-3 3 2">
  </a-light>

  <!-- Piso -->
  <a-plane
    rotation="-90 0 0"
    width="50"
    height="50"
    color="#111111">
  </a-plane>

  <!-- Modelo 3D -->
  <a-entity
    id="radio-entity"
    gltf-model="#radio-model"
    position="0 0 -5"
    rotation="0 180 0"
    scale="0.08 0.08 0.08"
    animation="property: rotation;
               to: 0 540 0;
               loop: true;
               dur: 20000;
               easing: linear">
  </a-entity>

  <!-- Caja invisible interactiva -->
  <a-box
    id="hover-box"
    class="clickable"

    position="0 1 -5"

    width="4"
    height="4"
    depth="4"

    opacity="0">
  </a-box>

</a-scene>

<script>

  const hoverBox   = document.getElementById('hover-box');
  const audio      = document.getElementById('song');

  const nowPlaying = document.getElementById('now-playing');
  const vinyl      = document.getElementById('vinyl');
  const hint       = document.getElementById('hint');

  let isPlaying = false;

  // CLICK
  hoverBox.addEventListener('click', () => {

      if(!isPlaying){

          audio.currentTime = 0;

          audio.play();

          isPlaying = true;

          nowPlaying.classList.add('visible');

          vinyl.classList.add('spinning');

          hint.innerHTML = 'REPRODUCIENDO...';

      }
      else{

          audio.pause();

          isPlaying = false;

          nowPlaying.classList.remove('visible');

          vinyl.classList.remove('spinning');

          hint.innerHTML = 'CLICK EN LA RADIO';

      }

  });

</script>

</body>
</html>
